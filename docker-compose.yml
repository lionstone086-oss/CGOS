version: "3.8"

services:
  cgos-hub:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  # n8n is included in the CGOS automation stack as a separate service
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=cgos
      - DB_POSTGRESDB_USER=cgos
      - DB_POSTGRESDB_PASSWORD=password
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cgos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cgos
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
